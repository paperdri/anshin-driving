<!DOCTYPE html>
<html lang="ja">

        }

            margin-top: 20px;
            line-height: 1.8;
        }
    </style>

<body>

    <div class="box">
        <h1>送信ありがとうございました！</h1>
        <p>
            お申し込み内容を確認のうえ、<br>
            <strong>後ほどメールまたはお電話にてご連絡いたします。</strong>
        </p>
        <p>
            通常、24時間以内にご連絡いたしますので、<br>
            しばらくお待ちください。
        </p>
        <p>
            万が一連絡がない場合は、<br>
            お手数ですが再度ご連絡ください。
        </p>
